name: CI

on:
  push:
    branches: [main, feature/zig-backend]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "test (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension
        run: |
          python zig/build_turbonet.py --install
        env:
          DHI_PATH: /tmp/dhi

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x

  test-free-threaded:
    name: "test (Python 3.14t free-threaded, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14t'
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension (free-threaded)
        run: |
          python zig/build_turbonet.py --install
        env:
          DHI_PATH: /tmp/dhi

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests (free-threaded)
        run: python -m pytest tests/ -v --tb=short -x

      - name: Thread-safety smoke test
        run: |
          python -c "
          import threading, concurrent.futures, json
          from turboapi import TurboAPI

          # Test 1: Concurrent route registration
          def create_app(tid):
              app = TurboAPI(title=f'App {tid}')
              for i in range(50):
                  @app.get(f'/t{tid}/r{i}')
                  def handler(t=tid, idx=i):
                      return {'thread': t, 'route': idx}
              return tid

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
              results = list(pool.map(create_app, range(8)))
              assert len(results) == 8
          print('Test 1: 8 threads x 50 routes = OK')

          # Test 2: Concurrent JSON serialization (exercises json.dumps hot path)
          errors = []
          def json_stress(tid):
              for i in range(1000):
                  data = {'thread': tid, 'iter': i, 'nested': {'a': [1, 2, 3]}}
                  s = json.dumps(data)
                  parsed = json.loads(s)
                  if parsed['thread'] != tid or parsed['iter'] != i:
                      errors.append(f'mismatch t{tid}i{i}')

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
              list(pool.map(json_stress, range(8)))
          assert not errors, f'JSON errors: {errors}'
          print('Test 2: 8 threads x 1000 json round-trips = OK')

          # Test 3: Concurrent model creation (dhi)
          try:
              from dhi import BaseModel, Field
              class StressModel(BaseModel):
                  name: str
                  value: int

              def model_stress(tid):
                  for i in range(500):
                      m = StressModel(name=f't{tid}', value=i)
                      assert m.name == f't{tid}'
                      assert m.value == i

              with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
                  list(pool.map(model_stress, range(8)))
              print('Test 3: 8 threads x 500 model instances = OK')
          except ImportError:
              print('Test 3: skipped (dhi not installed)')

          print('Free-threaded stress tests: ALL PASSED')
          "

  zig-test:
    name: "zig test"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python (for headers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Run Zig unit tests
        run: |
          PY_INCLUDE=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_LIBDIR=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          cd zig
          zig build test \
            -Dpython=3.14 \
            -Dpy-include="$PY_INCLUDE" \
            -Dpy-libdir="$PY_LIBDIR" \
            -Ddhi-path=/tmp/dhi
