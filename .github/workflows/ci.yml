name: CI

on:
  push:
    branches: [main, feature/zig-backend]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "test (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension
        run: |
          python zig/build_turbonet.py --install
        env:
          DHI_PATH: /tmp/dhi

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x

  test-free-threaded:
    name: "test (Python 3.14t free-threaded, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14t'
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension (free-threaded)
        run: |
          python zig/build_turbonet.py --install
        env:
          DHI_PATH: /tmp/dhi

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests (free-threaded)
        run: python -m pytest tests/ -v --tb=short -x

      - name: Thread-safety smoke test
        run: |
          python -c "
          import threading, concurrent.futures
          from turboapi import TurboAPI

          def create_app(tid):
              app = TurboAPI(title=f'App {tid}')
              for i in range(50):
                  @app.get(f'/t{tid}/r{i}')
                  def handler(t=tid, idx=i):
                      return {'thread': t, 'route': idx}
              return tid

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
              results = list(pool.map(create_app, range(8)))
              assert len(results) == 8
          print('Free-threaded smoke test: 8 threads x 50 routes = OK')
          "

  zig-test:
    name: "zig test"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python (for headers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Clone dhi (Zig modules)
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Run Zig unit tests
        run: |
          PY_INCLUDE=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_LIBDIR=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          cd zig
          zig build test \
            -Dpython=3.14 \
            -Dpy-include="$PY_INCLUDE" \
            -Dpy-libdir="$PY_LIBDIR" \
            -Ddhi-path=/tmp/dhi
