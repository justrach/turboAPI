name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "test (Python 3.14t, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14t'
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests (TurboAPI + TurboPG)
        run: |
          DESELECT="--deselect tests/test_fastapi_parity.py::TestWebSocket::test_websocket_send_receive"
          DESELECT="$DESELECT --deselect tests/test_fastapi_parity.py::TestWebSocket::test_websocket_send_json"
          if [ "$RUNNER_OS" = "macOS" ]; then
            DESELECT="$DESELECT --deselect tests/test_query_and_headers.py::test_query_parameters_comprehensive"
          fi
          python -m pytest tests/ -v --tb=short $DESELECT
        # Known: Linux x86_64 may segfault on Zig thread cleanup between tests
        continue-on-error: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Thread-safety stress test
        run: |
          python -c "
          import threading, concurrent.futures, json
          from turboapi import TurboAPI

          # 1: Concurrent route registration
          def create_app(tid):
              app = TurboAPI(title=f'App {tid}')
              for i in range(50):
                  @app.get(f'/t{tid}/r{i}')
                  def handler(t=tid, idx=i):
                      return {'thread': t, 'route': idx}
              return tid

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
              results = list(pool.map(create_app, range(8)))
              assert len(results) == 8
          print('OK: 8 threads x 50 routes')

          # 2: Concurrent JSON round-trips
          errors = []
          def json_stress(tid):
              for i in range(1000):
                  data = {'thread': tid, 'iter': i, 'nested': {'a': [1, 2, 3]}}
                  s = json.dumps(data)
                  parsed = json.loads(s)
                  if parsed['thread'] != tid or parsed['iter'] != i:
                      errors.append(f'mismatch t{tid}i{i}')

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
              list(pool.map(json_stress, range(8)))
          assert not errors, f'JSON errors: {errors}'
          print('OK: 8 threads x 1000 json round-trips')

          # 3: Concurrent dhi model creation
          try:
              from dhi import BaseModel
              class StressModel(BaseModel):
                  name: str
                  value: int

              def model_stress(tid):
                  for i in range(500):
                      m = StressModel(name=f't{tid}', value=i)
                      assert m.name == f't{tid}'
                      assert m.value == i

              with concurrent.futures.ThreadPoolExecutor(max_workers=8) as pool:
                  list(pool.map(model_stress, range(8)))
              print('OK: 8 threads x 500 dhi models')
          except ImportError:
              print('SKIP: dhi not installed')

          print('All stress tests passed')
          "

  turboapi-core-test:
    name: "turboapi-core tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run turboapi-core unit tests
        run: cd turboapi-core && zig build test

      - name: Run adversarial router benchmark (anti-cache verification)
        run: |
          cd turboapi-core
          zig build-exe bench_adversarial.zig -OReleaseFast -lc
          OUTPUT=$(./bench_adversarial 2>&1)
          echo "$OUTPUT"

          # Verify correctness passed
          echo "$OUTPUT" | grep -q "PASS.*all correctness checks passed" || { echo "FAIL: correctness check failed"; exit 1; }

          # Verify match/miss counts are correct (12 matches + 1 miss per iter)
          echo "$OUTPUT" | grep -q "matches=60000000 misses=5000000" || { echo "FAIL: match/miss count wrong"; exit 1; }

          # Extract Test 2 (anti-DCE) ns/op and verify it's under 100ns
          # (generous threshold — CI runners are slower than M3 Pro)
          NS=$(echo "$OUTPUT" | grep "Anti-DCE" -A 1 | grep "ns avg" | sed -n 's/.*[[:space:]]\([0-9]*\)ns avg/\1/p')
          echo "Anti-DCE benchmark: ${NS}ns per lookup"
          if [ "$NS" -gt 100 ]; then
            echo "FAIL: router benchmark regression — ${NS}ns > 100ns threshold"
            exit 1
          fi
          echo "PASS: router benchmark within threshold (${NS}ns < 100ns)"

  zig-test:
    name: "zig unit tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python 3.14 (for headers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Run Zig unit tests
        run: |
          PY_INCLUDE=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_LIBDIR=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          cd zig
          zig build test \
            -Dpython=3.14 \
            -Dpy-include="$PY_INCLUDE" \
            -Dpy-libdir="$PY_LIBDIR"
