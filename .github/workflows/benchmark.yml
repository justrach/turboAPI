name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: "TurboAPI vs FastAPI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14t'
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install wrk
        run: |
          sudo apt-get update
          sudo apt-get install -y wrk

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install

      - name: Install packages
        run: |
          pip install -e .
          pip install fastapi uvicorn requests

      - name: Run benchmark
        continue-on-error: true  # Known: Linux segfault on Zig thread cleanup
        run: |
          python benchmarks/turboapi_vs_fastapi.py --duration 10 --threads 4 --connections 100

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        continue-on-error: true  # Known: Linux Zig server may fail to start
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync(
              'python benchmarks/turboapi_vs_fastapi.py --duration 5 --threads 2 --connections 50',
              { encoding: 'utf-8', timeout: 120000 }
            ).trim();

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚡ Benchmark Results\n\n\`\`\`\n${output}\n\`\`\``
            });
