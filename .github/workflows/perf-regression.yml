name: Performance Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  regression:
    name: "HTTP regression gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14t'
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install --release

      - name: Install Python package + deps
        run: |
          pip install -e .
          pip install uv

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Run regression benchmark
        run: uv run --python 3.14t python benchmarks/bench_regression.py --ci

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment;
            try {
              comment = fs.readFileSync('/tmp/bench_pr_comment.md', 'utf8');
            } catch {
              comment = 'Performance regression benchmark completed but no report generated.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main'
        run: |
          uv run --python 3.14t python benchmarks/bench_regression.py --save --history
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baseline.json benchmarks/history/
          git diff --cached --quiet || git commit -m "chore: update perf baseline [skip ci]"
          git push

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-regression-results
          path: |
            /tmp/bench_results.json
            /tmp/bench_pr_comment.md
