name: Docker Image

# Builds and pushes ghcr.io/justrach/turboapi on every `v*` tag.
# Uses GITHUB_TOKEN — no PAT needed; pushing from this workflow auto-links the
# package to the repo on first push.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or sha)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/turboapi
          # latest is auto-added for non-prerelease semver tags
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show pushed digest
        run: |
          echo "Pushed digest: ${{ steps.meta.outputs.digest || 'see build step' }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
