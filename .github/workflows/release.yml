name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  actions: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Bump version
        id: bump
        run: |
          pip install bump2version

          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "Current: $CURRENT"

          # bump2version config
          cat > .bumpversion.cfg << EOF
          [bumpversion]
          current_version = $CURRENT
          commit = False
          tag = False

          [bumpversion:file:pyproject.toml]
          search = version = "{current_version}"
          replace = version = "{new_version}"

          [bumpversion:file:python/setup.py]
          search = version="{current_version}"
          replace = version="{new_version}"

          [bumpversion:file:python/turboapi/__init__.py]
          search = __version__ = "{current_version}"
          replace = __version__ = "{new_version}"
          EOF

          bump2version ${{ github.event.inputs.version_bump }} --allow-dirty

          NEW=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "New: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Commit, tag, push
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add pyproject.toml python/setup.py python/turboapi/__init__.py .bumpversion.cfg
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push && git push --tags

      - name: Trigger build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          echo "Tagged v${VERSION}"
          gh workflow run build-and-release.yml --ref main
