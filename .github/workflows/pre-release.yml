name: Pre-release (RC / Beta)

on:
  push:
    branches:
      - 'rc/**'
      - 'feature/zig-backend'
  workflow_dispatch:
    inputs:
      pre_number:
        description: 'Pre-release number (e.g. 1, 2, 3). Leave empty to auto-increment.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: "test (${{ matrix.os }}, py${{ matrix.python }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.14t'
          - os: macos-latest
            python: '3.14t'
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install
        env:
          DHI_PATH: /tmp/dhi

      - name: Install Python package + test deps
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -k "not websocket"

  pre-release:
    name: Build & publish pre-release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Compute pre-release version
        id: version
        run: |
          BASE=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          # Strip any existing pre-release suffix to get the clean base (e.g. 1.0.0rc1 -> 1.0.0)
          BASE_CLEAN=$(echo "$BASE" | sed 's/[a-z].*//')
          echo "base=$BASE_CLEAN"

          # rc/* branches get rcN suffix; everything else gets bN (beta)
          BRANCH="${GITHUB_REF_NAME}"
          if echo "$BRANCH" | grep -q '^rc/'; then
            PREFIX="rc"
          else
            PREFIX="b"
          fi

          # Manual number overrides auto-increment
          if [ -n "${{ github.event.inputs.pre_number }}" ]; then
            N="${{ github.event.inputs.pre_number }}"
          else
            N=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "1")
            [ "$N" = "0" ] && N=1
          fi

          VERSION="${BASE_CLEAN}${PREFIX}${N}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Pre-release version: $VERSION"

      - name: Set version in pyproject.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          cat pyproject.toml | head -8

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: pre-release-sdist
          path: dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## 🚀 Published turboapi==$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "pip install turboapi==$VERSION" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
