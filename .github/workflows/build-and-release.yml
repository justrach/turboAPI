name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          SETUP_VERSION=$(grep -m1 'version="' python/setup.py | sed 's/.*version="\([^"]*\)".*/\1/')
          INIT_VERSION=$(grep -m1 '__version__ = ' python/turboapi/__init__.py | sed 's/.*"\(.*\)"/\1/')

          test "$VERSION" = "$SETUP_VERSION"
          test "$VERSION" = "$INIT_VERSION"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            test "$VERSION" = "$TAG_VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build:
    name: "build (${{ matrix.os }}, ${{ matrix.python }})"
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.14t'
          - os: macos-latest
            python: '3.14t'
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install --release

      - name: Build wheel
        run: |
          pip install build wheel setuptools
          # --no-isolation so the .so installed by build_turbonet.py is included
          python -m build --wheel --no-isolation --outdir dist-tmp/
          # Re-tag as platform-specific (contains compiled .so)
          PYTAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          ABITAG=$(python -c "import sys; ft='t' if hasattr(sys,'_is_gil_enabled') and not sys._is_gil_enabled() else ''; print(f'cp{sys.version_info.major}{sys.version_info.minor}{ft}')")
          PLAT=$(python -c "
          import sysconfig, platform
          p = sysconfig.get_platform().replace('-','_').replace('.','_')
          if platform.system() == 'Linux':
              arch = platform.machine()
              p = f'manylinux_2_17_{arch}.manylinux2014_{arch}'
          print(p)
          ")
          python -m wheel tags --python-tag=$PYTAG --abi-tag=$ABITAG --platform-tag=$PLAT --remove dist-tmp/*.whl
          mkdir -p dist && mv dist-tmp/*.whl dist/

      - name: Verify wheel can import native backend
        run: |
          python -m venv /tmp/turboapi-wheel-smoke
          /tmp/turboapi-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/turboapi-wheel-smoke/bin/python - <<'PY'
          import turboapi.turbonet as turbonet

          assert hasattr(turbonet, "TurboServer")
          assert hasattr(turbonet, "ResponseView")
          print("native backend import ok")
          PY

      - name: Verify macOS wheel has no Python framework dependency
        if: runner.os == 'macOS'
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import zipfile

          wheel = next(pathlib.Path("dist").glob("*.whl"))
          extract_dir = pathlib.Path("/tmp/turboapi-wheel-linkcheck")
          if extract_dir.exists():
              import shutil
              shutil.rmtree(extract_dir)
          with zipfile.ZipFile(wheel) as zf:
              zf.extractall(extract_dir)
          extensions = list(extract_dir.glob("turboapi/turbonet*.so"))
          assert extensions, "turbonet extension missing from wheel"
          output = subprocess.check_output(["otool", "-L", str(extensions[0])], text=True)
          print(output)
          assert "Python.framework" not in output
          assert "PythonT.framework" not in output
          PY

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '{wheel-*,sdist}'
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, publish]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: '{wheel-*,sdist}'
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          files: dist/*
          generate_release_notes: true
