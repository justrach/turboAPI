name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build:
    name: "build (${{ matrix.os }}, ${{ matrix.python }})"
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.13'
          - os: ubuntu-latest
            python: '3.14'
          - os: ubuntu-latest
            python: '3.14t'
          - os: macos-latest
            python: '3.13'
          - os: macos-latest
            python: '3.14'
          - os: macos-latest
            python: '3.14t'
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone dhi
        run: git clone --depth 1 https://github.com/justrach/dhi.git /tmp/dhi

      - name: Build turbonet extension
        run: python zig/build_turbonet.py --install --release
        env:
          DHI_PATH: /tmp/dhi

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --outdir dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '{wheel-*,sdist}'
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: '{wheel-*,sdist}'
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
